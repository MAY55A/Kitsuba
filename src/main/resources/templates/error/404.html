<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1" name="viewport">
    <link rel="stylesheet" th:href="@{/styles/error.css}">
    <title>Access Denied</title>
</head>
<body>

<main class="error-page">

    <div class="error-card">

        <img alt="confused mascot" class="error-mascot" th:src="@{/images/pages/not-found.png}">

        <h1>Page Not Found</h1>

        <p class="error-message">
            The page you are looking for doesn’t exist or may have been moved.
        </p>

        <div class="actions">
            <a class="btn-primary" href="/">Go Home</a>
            <button class="btn-secondary" onclick="history.back()">⬅ Go Back</button>
        </div>

    </div>

</main>

</body>
</html>
