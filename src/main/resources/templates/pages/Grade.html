<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="initial-scale=1, maximum-scale=1" name="viewport">
    <link rel="shortcut icon" th:href="@{/icons/kitsuba.png}" type="image/x-icon">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/styles/grade.css}">
    <title th:text="'KITSUBA | Learning | Grade ' + ${grade}">KOTOBA | Learning</title>
</head>
<body>
<main>
    <div class="modal-overlay" id="loading">
        <div>
            <div class="loading-mascot">
                <img alt="mascot waiting" class="frame frame1" src="/images/mascot/loading_frame1.png">
                <img alt="mascot waiting" class="frame frame2" src="/images/mascot/loading_frame2.png">
            </div>
            <p>Loading, please wait...</p>
        </div>
    </div>
    <a class="go-back" href="/learn" title="go back">⬅</a>
    <header>
        <h1>Grade <span id="grade" th:text="${grade}"></span></h1>
        <div class="progress">
            <div aria-valuemax="100" aria-valuemin="0"
                 class="progress-bar progress-bar-striped progress-bar-animated bg-warning" id="progress-bar"
                 role="progressbar"></div>
        </div>
    </header>
    <section id="kanji-list">
        <script th:src="@{/scripts/render/displayGrade.js}" type="module"></script>
    </section>
</main>
</body>
</html>
