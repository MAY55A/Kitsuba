<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta content="initial-scale=1, maximum-scale=1" name="viewport">
    <link rel="shortcut icon" th:href="@{/icons/kitsuba.png}" type="image/x-icon">
    <link rel="stylesheet" th:href="@{/styles/kanji_test.css}">
    <title th:text="'KITSUBA | Kanji | ' + ${kanji}">Kotoba | Kanji</title>
